lane = "model"
branch = "auto/model-loop"
research_agent = "roadmap_researcher"
implement_agent = "implementer"
verify_agent = "model_verifier"
runtime_subdir = "model"
auto_commit = true
auto_push = false
sleep_seconds = 180
failure_backoff_seconds = 300
max_files_changed_per_loop = 16
roadmap_path = "docs/model-improvement-roadmap.md"

allowed_paths = [
  "AGENTS.md",
  "README.md",
  "data/tournaments/**",
  "docs/architecture.md",
  "docs/model-improvement-roadmap.md",
  "docs/model.md",
  "docs/results/best-model-5y-backtest.md",
  "sql/schema.sql",
  "src/cbb/cli.py",
  "src/cbb/config.py",
  "src/cbb/db.py",
  "src/cbb/ingest/**",
  "src/cbb/modeling/**",
  "src/cbb/repair.py",
  "src/cbb/team_catalog.py",
  "src/cbb/team_home_locations.py",
  "tests/**",
]

disallowed_paths = [
  "agents/**",
  "chart/**",
  "docs/infra-roadmap.md",
  "docs/ui-ux-roadmap.md",
  "ops/**",
  "scripts/run_autonomous_loops.py",
  "scripts/run_infra_loops.py",
  "src/cbb/autonomous_loop.py",
  "src/cbb/dashboard/**",
  "src/cbb/infra_loop.py",
  "src/cbb/ui/**",
]

whitelist_domains = []
extra_vendor_domains = []

allowed_commands = [
  "git",
  "codex",
  "make",
  "rg",
  "sed",
  "cat",
  "python3",
  "./.venv/bin/python",
  "./.venv/bin/ruff",
  "./.venv/bin/mypy",
  "./.venv/bin/pytest",
]

python_trigger_globs = [
  "AGENTS.md",
  "README.md",
  "data/tournaments/**",
  "docs/model-improvement-roadmap.md",
  "docs/model.md",
  "docs/results/best-model-5y-backtest.md",
  "sql/schema.sql",
  "src/cbb/cli.py",
  "src/cbb/config.py",
  "src/cbb/db.py",
  "src/cbb/ingest/**",
  "src/cbb/modeling/**",
  "src/cbb/repair.py",
  "src/cbb/team_catalog.py",
  "src/cbb/team_home_locations.py",
  "tests/**",
]

source_seed_urls = []

[verification]
always = [
  "./.venv/bin/ruff check src tests scripts",
]

python = [
  "./.venv/bin/mypy src",
  "./.venv/bin/pytest -q tests/test_modeling.py tests/test_report.py tests/test_cli.py",
]
