{% extends "base.html" %}

{% block head_extra %}
  <link rel="stylesheet" href="/static/react/dashboard-react.css">
{% endblock %}

{% block content %}
  <section class="panel">
    <div
      id="react-dashboard-root"
      data-app-path="{{ react_path }}"
      data-dashboard-api="/api/dashboard"
      data-upcoming-api="/api/upcoming"
      data-window="{{ selected_window }}"
    ></div>
    <noscript>
      <p class="empty-block">
        The React beta needs JavaScript. Use the classic dashboard routes if
        you want the server-rendered path instead.
      </p>
    </noscript>
  </section>
{% endblock %}

{% block scripts %}
  <script type="module" src="/static/react/dashboard-react.js"></script>
{% endblock %}
