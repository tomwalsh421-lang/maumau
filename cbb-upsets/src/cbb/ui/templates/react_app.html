{% extends "base.html" %}

{% block head_extra %}
  <link rel="stylesheet" href="/static/react/dashboard-react.css">
{% endblock %}

{% block content %}
  <section class="panel">
    <div
      id="react-dashboard-root"
      data-app-path="{{ react_path }}"
      data-dashboard-api="/api/dashboard"
      data-performance-api="/api/performance"
      data-upcoming-api="/api/upcoming"
      data-classic-href="{{ classic_href }}"
      data-classic-label="{{ classic_label }}"
      data-window="{{ selected_window }}"
    ></div>
    <noscript>
      <p class="empty-block">
        This React route needs JavaScript.
        <a href="{{ classic_href }}">{{ classic_label }}</a>.
      </p>
    </noscript>
  </section>
{% endblock %}

{% block scripts %}
  <script type="module" src="/static/react/dashboard-react.js"></script>
{% endblock %}
