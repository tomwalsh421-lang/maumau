nameOverride: ""
fullnameOverride: ""

ingress:
  enabled: false
  annotations: {}
  hosts: []
  tls: []

httpRoute:
  enabled: false
  annotations: {}
  parentRefs: []
  hostnames: []
  rules: []

serviceAccount:
  create: false
  name: ""

runtime:
  enabled: false
  replicaCount: 1
  image:
    repository: cbb-upsets-cli
    tag: ""
    pullPolicy: IfNotPresent
  command: []
  args:
    - agent
    - --delay-mins
    - "15"
  workingDir: /app
  databaseUrl: ""
  env:
    ODDS_API_BASE_URL: https://api.the-odds-api.com/v4
  envFromSecretName: ""
  podAnnotations: {}
  resources: {}

nginx:
  replicaCount: 1
  image:
    repository: nginx
    tag: stable
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 80
    nodePort: 30080
  resources: {}
  httpRoute:
    enabled: false

postgresql:
  enabled: true
  image:
    digest: "sha256:9a4d4d644f36fa01715066c769e0c480a4bdd528f6b4880fa8e32d9fd715ec8a"
  auth:
    username: cbb
    password: cbbpass
    database: cbb_upsets
  primary:
    persistence:
      enabled: true
      size: 1Gi
  test:
    enabled: false
