apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbb-upsets.nginxFullname" . }}
  labels:
    {{- include "cbb-upsets.nginxLabels" . | nindent 4 }}
spec:
  type: {{ .Values.nginx.service.type }}
  ports:
    - port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if eq .Values.nginx.service.type "NodePort" }}
      nodePort: {{ .Values.nginx.service.nodePort }}
      {{- end }}
  selector:
    {{- include "cbb-upsets.nginxSelectorLabels" . | nindent 4 }}
