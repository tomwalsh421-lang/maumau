{{- include "cbb-upsets.runtimeValidation" . -}}
{{- if .Values.runtime.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cbb-upsets.runtimeFullname" . }}
  labels:
    {{- include "cbb-upsets.runtimeLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.runtime.replicaCount }}
  selector:
    matchLabels:
      {{- include "cbb-upsets.runtimeSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cbb-upsets.runtimeSelectorLabels" . | nindent 8 }}
      {{- with .Values.runtime.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cbb-upsets.serviceAccountName" . }}
      containers:
        - name: runtime
          image: {{ include "cbb-upsets.runtimeImage" . | quote }}
          imagePullPolicy: {{ .Values.runtime.image.pullPolicy }}
          workingDir: {{ .Values.runtime.workingDir | quote }}
          securityContext:
            runAsNonRoot: true
          {{- with .Values.runtime.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runtime.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: DATABASE_URL
              value: {{ include "cbb-upsets.runtimeDatabaseUrl" . | quote }}
            {{- range $name := keys .Values.runtime.env | sortAlpha }}
            - name: {{ $name }}
              value: {{ index $.Values.runtime.env $name | quote }}
            {{- end }}
          {{- if or .Values.runtime.secretEnv .Values.runtime.envFromSecretName }}
          envFrom:
            {{- with .Values.runtime.secretEnv }}
            - secretRef:
                name: {{ include "cbb-upsets.runtimeSecretFullname" $ }}
            {{- end }}
            {{- with .Values.runtime.envFromSecretName }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          {{- end }}
          {{- with .Values.runtime.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
