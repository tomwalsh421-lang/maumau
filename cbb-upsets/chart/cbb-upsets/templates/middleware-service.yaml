{{- if .Values.middleware.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "cbb-upsets.middlewareFullname" . }}
  labels:
    {{- include "cbb-upsets.middlewareLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.middleware.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "cbb-upsets.middlewareSelectorLabels" . | nindent 4 }}
{{- end }}
